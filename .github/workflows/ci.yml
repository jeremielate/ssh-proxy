name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (but never for tag releases).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --verbose
      - name: Test
        run: cargo test --verbose

  # Build release artifacts. Runs on every push/PR as a compile check, and
  # uploads to a GitHub Release when triggered by a `v*` tag.
  release:
    name: Release (${{ matrix.target }})
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to upload assets to the GitHub Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4
      - name: Upload / build binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: ssh-proxy
          target: ${{ matrix.target }}
          # Static musl binaries so the remote binary can be scp'd onto any
          # Linux server regardless of its libc.
          archive: $bin-$target
          # Only attach to a release on tag pushes; otherwise this is just a
          # cross-compile smoke test and nothing is uploaded.
          dry_run: ${{ !startsWith(github.ref, 'refs/tags/') }}
          checksum: sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Aggregate status target, handy for a single required branch-protection check.
  ci:
    name: CI
    if: always()
    needs: [lint, test, release]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more jobs failed."
            exit 1
          fi
